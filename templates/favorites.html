<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookBase - My Favorites</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- CORE STYLES & COLORS --- */
        :root {
            --bg-color: #FCF9F5;
            --sidebar-bg: #F4EBE1;
            --primary-orange: #F05A28;
            --dark-navy: #0A2E4D;
            --text-dark: #333333;
            --text-muted: #888888;
            --card-bg: #FDFBFA;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 250px;
            background-color: var(--sidebar-bg);
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
        }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 3rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .hamburger-btn {
            display: none; /* Hidden on desktop */
            background: none;
            border: none;
            font-size: 1.8rem;
            color: var(--dark-navy);
            cursor: pointer;
        }

        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            flex-grow: 1;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-dark);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s ease;
        }

        .nav-links a.active {
            background-color: #FFEAE3;
            color: var(--primary-orange);
        }

        .nav-links a:hover:not(.active) {
            background-color: rgba(0,0,0,0.05);
        }

        .sidebar-bottom {
            margin-top: auto;
        }

        .btn-orange {
            background-color: var(--primary-orange);
            color: white;
            text-decoration: none;
            padding: 0.6rem 1.5rem;
            border-radius: 20px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            text-align: center;
            transition: background 0.2s;
            width: 100%;
            display: block;
        }
        
        .btn-orange:hover { background-color: #d94b1f; }

        /* --- MAIN CONTENT --- */
        .main-content {
            margin-left: 250px;
            flex-grow: 1;
            padding: 3rem;
        }

        .page-title {
            font-family: 'Georgia', serif;
            font-style: italic;
            color: var(--dark-navy);
            margin-bottom: 2rem;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Book Grid */
        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 2rem;
        }

        .book-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            cursor: pointer;
            transition: transform 0.2s, opacity 0.3s ease;
        }

        .book-card:hover {
            transform: translateY(-5px);
        }

        .img-container {
            position: relative;
            width: 100%;
            height: 280px;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .heart-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            color: #ccc;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: color 0.2s;
        }

        .heart-btn.favorited {
            color: var(--primary-orange);
        }

        .book-card h4 { font-size: 1rem; margin-bottom: 4px; color: var(--text-dark); }
        .book-card p { font-size: 0.8rem; color: var(--text-muted); }

        /* --- SIDE PANEL (MODAL) --- */
        .side-panel {
            position: fixed;
            top: 0;
            right: -400px;
            width: 400px;
            height: 100vh;
            background-color: var(--dark-navy);
            color: white;
            box-shadow: -5px 0 15px rgba(0,0,0,0.2);
            transition: right 0.3s ease-in-out;
            z-index: 1000;
            padding: 2rem;
            display: flex;
            flex-direction: column;
        }

        .side-panel.open { right: 0; }

        .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 2rem;
            align-self: flex-end;
            cursor: pointer;
            margin-bottom: 1rem;
        }

        .panel-img {
            width: 100%;
            height: 350px;
            object-fit: contain;
            background: white;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            padding: 10px;
        }

        .panel-details h2 { font-family: 'Georgia', serif; margin-bottom: 0.5rem; }
        .panel-details h4 { font-weight: normal; color: #A0C4E0; margin-bottom: 2rem; }
        
        .panel-meta {
            font-size: 0.9rem;
            color: #A0C4E0;
            line-height: 1.8;
            margin-bottom: auto;
        }

        .panel-meta span { color: white; }

        .btn-block {
            width: 100%;
            padding: 1rem;
            font-size: 1.1rem;
            margin-top: 2rem;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            z-index: 999;
        }
        .overlay.active { display: block; }

        /* --- MOBILE RESPONSIVENESS (PHONES & TABLETS) --- */
        @media (max-width: 850px) {
            body { flex-direction: column; }
            
            /* Snap Sidebar to the Top */
            .sidebar {
                position: relative;
                width: 100%;
                height: auto;
                padding: 1rem;
                flex-direction: column;
                align-items: stretch;
                gap: 1rem;
                border-bottom: 1px solid var(--border-color);
                z-index: 10;
            }
            .sidebar-header { margin-bottom: 0; }
            .logo { margin-bottom: 0; }
            .hamburger-btn { display: block; } /* Show hamburger on mobile */

            /* Hide menus by default on mobile, stack them vertically */
            .nav-links, .sidebar-bottom { 
                display: none; 
                flex-direction: column;
                width: 100%;
                gap: 0.5rem;
            }
            
            /* Classes toggled by JavaScript to show the menu */
            .nav-links.show, .sidebar-bottom.show {
                display: flex;
            }

            .sidebar-bottom { margin-top: 0; justify-content: center; }
            .sidebar-bottom .btn-orange { width: auto; padding: 0.5rem 2rem; }
            
            /* Main Content Adjustments */
            .main-content { margin-left: 0; padding: 1.5rem 1rem; }
            
            /* Header & Search Bar */
            .top-header { flex-direction: column; gap: 1rem; align-items: stretch; }
            .search-bar { width: 100%; }
            .auth-buttons { justify-content: center; width: 100%; gap: 0.5rem; }
            .auth-buttons a { flex: 1; padding: 0.6rem 0.5rem; text-align: center; font-size: 0.85rem;}
            
            /* Make Category Pills scrollable sideways with thumb */
            .filters-container { gap: 1rem; }
            .category-pills { 
                flex-wrap: nowrap; 
                overflow-x: auto; 
                padding-bottom: 0.5rem;
                -webkit-overflow-scrolling: touch; /* Smooth scroll on iOS */
                scrollbar-width: none; /* Hides scrollbar on Firefox */
                max-width: 100vw;
            }
            .category-pills::-webkit-scrollbar { display: none; } /* Hides scrollbar on Chrome/Safari */
            .pill { white-space: nowrap; }
            
            /* Book Grid (Perfect 2-column for mobile) */
            .book-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 1rem; }
            .img-container { height: 210px; }
            
            /* Make Side Panel Full-Screen on Mobile */
            .side-panel { width: 100%; right: -100%; padding: 1.5rem; }
            .panel-img { height: 250px; }

            /* Admin Dashboard Specific Fixes */
            .action-grid { grid-template-columns: 1fr; gap: 1.5rem; }
            .form-row { flex-direction: column; gap: 0; }
            .admin-header { padding: 1.5rem 1rem; flex-direction: column; gap: 1rem; text-align: center; }
            .log-section { padding: 1rem; overflow-x: auto; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <i class="fa-solid fa-book-open"></i> BookBase
            </div>
            <button class="hamburger-btn" onclick="toggleMobileMenu()">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>
        
        <nav class="nav-links" id="mobile-menu">
            <a href="/"><i class="fa-regular fa-compass"></i> Discover</a>
            <a href="/favorites" class="active"><i class="fa-regular fa-heart"></i> Favorites</a>
            <a href="/issued"><i class="fa-solid fa-book"></i> Books Issued</a>
        </nav>
        <div class="sidebar-bottom" id="mobile-menu-bottom">
            <a href="/logout" class="btn-orange">Logout</a>
        </div>
    </aside>

    <main class="main-content">
        <h2 class="page-title">My Favorite Books <i class="fa-solid fa-heart" style="color: var(--primary-orange); font-size: 1.4rem;"></i></h2>

        <div class="book-grid">
            {% for book in books %}
            <div class="book-card" id="card-{{ book.book_id }}" onclick="openPanel('{{ book.book_id }}', '{{ book.title|replace('\'', '\\\'') }}', '{{ book.author_name|replace('\'', '\\\'') }}', '{{ book.category_name }}', '{{ book.year }}', '{{ book.publisher|replace('\'', '\\\'') }}', '{{ book.image_url }}')">
                <div class="img-container">
                    <img src="{{ book.image_url or 'https://via.placeholder.com/200x300?text=No+Cover' }}" alt="{{ book.title }}" loading="lazy" decoding="async" referrerpolicy="no-referrer">
                    <button class="heart-btn favorited" onclick="event.stopPropagation(); toggleFav('{{ book.book_id }}', this)">
                        <i class="fa-solid fa-heart"></i>
                    </button>
                </div>
                <h4>{{ book.title }}</h4>
                <p>{{ book.author_name }}</p>
            </div>
            {% else %}
            <p style="color: var(--text-muted); grid-column: 1 / -1;">You haven't favorited any books yet. Go to Discover to find some!</p>
            {% endfor %}
        </div>
    </main>

    <div id="overlay" class="overlay" onclick="closePanel()"></div>
    
    <div id="side-panel" class="side-panel">
        <button class="close-btn" onclick="closePanel()">&times;</button>
        <img id="panel-img" class="panel-img" src="" alt="Book Cover" decoding="async" referrerpolicy="no-referrer">
        <div class="panel-details">
            <h2 id="panel-title">Book Title</h2>
            <h4 id="panel-author">Author Name</h4>
            <div class="panel-meta">
                <p>Genre: <span id="panel-genre"></span></p>
                <p>Year: <span id="panel-year"></span></p>
                <p>Publisher: <span id="panel-publisher"></span></p>
            </div>
        </div>
        <button id="issue-btn" class="btn-orange btn-block" onclick="issueBook()">Read Now (Issue)</button>
    </div>

    <script>
        // Toggles the mobile menu on and off
        function toggleMobileMenu() {
            document.getElementById('mobile-menu').classList.toggle('show');
            document.getElementById('mobile-menu-bottom').classList.toggle('show');
        }

        let currentSelectedBookId = null;

        function openPanel(id, title, author, genre, year, publisher, imgUrl) {
            currentSelectedBookId = id;
            document.getElementById('panel-title').innerText = title;
            document.getElementById('panel-author').innerText = author;
            document.getElementById('panel-genre').innerText = genre || 'N/A';
            document.getElementById('panel-year').innerText = year !== 'None' ? year : 'N/A';
            document.getElementById('panel-publisher').innerText = publisher !== 'None' ? publisher : 'N/A';
            document.getElementById('panel-img').src = imgUrl || 'https://via.placeholder.com/200x300?text=No+Cover';
            
            document.getElementById('side-panel').classList.add('open');
            document.getElementById('overlay').classList.add('active');
        }

        function closePanel() {
            document.getElementById('side-panel').classList.remove('open');
            document.getElementById('overlay').classList.remove('active');
            currentSelectedBookId = null;
        }

        function issueBook() {
            if (!currentSelectedBookId) return;

            const form = document.createElement('form');
            form.method = 'POST';
            form.action = '/issue/' + currentSelectedBookId;
            document.body.appendChild(form);
            form.submit();
        }

        function toggleFav(bookId, btnElement) {
            fetch('/toggle_favorite', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ book_id: bookId })
            })
            .then(response => {
                if (response.status === 401) {
                    window.location.href = '/login';
                    return;
                }
                return response.json();
            })
            .then(data => {
                if (data && data.status === 'success') {
                    if (data.action === 'removed') {
                        // Soft delete UX: Fade out the card smoothly if they unfavorite it here
                        const card = document.getElementById('card-' + bookId);
                        card.style.opacity = '0';
                        setTimeout(() => card.style.display = 'none', 300);
                    }
                }
            })
            .catch(error => console.error('Error:', error));
        }
    </script>
</body>
</html>
