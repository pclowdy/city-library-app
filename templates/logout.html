<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookBase - Logged Out</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Exact same CSS layout */
        :root { --bg-color: #FCF9F5; --primary-orange: #F05A28; --dark-navy: #0A2E4D; --text-dark: #333333; --text-muted: #888888; --card-bg: #FFFFFF; --border-color: #EAEAEA; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; color: var(--text-dark); }
        .brand-header { font-size: 1.5rem; font-weight: bold; color: var(--dark-navy); display: flex; align-items: center; gap: 10px; margin-bottom: 2rem; }
        .auth-card { background: var(--card-bg); padding: 3rem; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); width: 100%; max-width: 450px; text-align: center; }
        .auth-card h2 { font-family: 'Georgia', serif; font-style: italic; color: var(--dark-navy); margin-bottom: 0.5rem; font-size: 1.8rem; }
        .auth-card p.subtitle { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1rem; line-height: 1.5; }
        .back-link { margin-top: 2rem; display: inline-flex; align-items: center; gap: 8px; color: var(--text-muted); text-decoration: none; font-size: 0.9rem; transition: color 0.2s; }
        .back-link:hover { color: var(--dark-navy); }
        /* --- MOBILE RESPONSIVENESS (PHONES & TABLETS) --- */
        @media (max-width: 850px) {
            body { flex-direction: column; }
            
            /* Snap Sidebar to the Top */
            .sidebar {
                position: relative;
                width: 100%;
                height: auto;
                padding: 1rem;
                flex-direction: column;
                align-items: center;
                gap: 1rem;
                border-bottom: 1px solid var(--border-color);
                z-index: 10;
            }
            .logo { margin-bottom: 0; }
            .nav-links { flex-direction: row; flex-wrap: wrap; justify-content: center; gap: 0.5rem; }
            .sidebar-bottom { margin-top: 0; width: 100%; display: flex; justify-content: center; }
            .sidebar-bottom .btn-orange { width: auto; padding: 0.5rem 2rem; }
            
            /* Main Content Adjustments */
            .main-content { margin-left: 0; padding: 1.5rem 1rem; }
            
            /* Header & Search Bar */
            .top-header { flex-direction: column; gap: 1rem; align-items: stretch; }
            .search-bar { width: 100%; }
            .auth-buttons { justify-content: center; width: 100%; gap: 0.5rem; }
            .auth-buttons a { flex: 1; padding: 0.6rem 0.5rem; text-align: center; font-size: 0.85rem;}
            
            /* Make Category Pills scrollable sideways with thumb */
            .filters-container { gap: 1rem; }
            .category-pills { 
                flex-wrap: nowrap; 
                overflow-x: auto; 
                padding-bottom: 0.5rem;
                -webkit-overflow-scrolling: touch; /* Smooth scroll on iOS */
                scrollbar-width: none; /* Hides scrollbar on Firefox */
                max-width: 100vw;
            }
            .category-pills::-webkit-scrollbar { display: none; } /* Hides scrollbar on Chrome/Safari */
            .pill { white-space: nowrap; }
            
            /* Book Grid (Perfect 2-column for mobile) */
            .book-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 1rem; }
            .img-container { height: 210px; }
            
            /* Make Side Panel Full-Screen on Mobile */
            .side-panel { width: 100%; right: -100%; padding: 1.5rem; }
            .panel-img { height: 250px; }

            /* Admin Dashboard Specific Fixes */
            .action-grid { grid-template-columns: 1fr; gap: 1.5rem; }
            .form-row { flex-direction: column; gap: 0; }
            .admin-header { padding: 1.5rem 1rem; flex-direction: column; gap: 1rem; text-align: center; }
            .log-section { padding: 1rem; overflow-x: auto; }
        }
    </style>
</head>
<body>

    <div class="brand-header">
        <i class="fa-solid fa-book-open"></i> BookBase
    </div>

    <div class="auth-card">
        <h2>Logged Out</h2>
        <p class="subtitle">You have successfully signed out of BookBase.<br>Have a great day!</p>
    </div>

    <a href="/" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>

</body>
</html>
